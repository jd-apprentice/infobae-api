name: Docker Publish

on:
  workflow_dispatch:
  pull_request:
    branches: ["develop"]
    paths:
      - "src/**"
      - "tests/**"
  push:
    branches: ["master"]
    tags:
      - "v*"
  release:
    types: [published]

env:
  BRANCH_NAME: ${{ github.ref_name }}
  APP_NAME: infobae_api
  APP_VERSION: latest
  APP_DEV_VERSION: unstable

jobs:
  test:
    permissions:
      contents: read

    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2

      - name: Set up Go
        uses: actions/setup-go@5a083d0e9a84784eb32078397cf5459adecb4c40
        with:
          go-version: 1.23.10

      - name: Test
        run: go test -v ./tests

  develop:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref_name != 'master' && !startsWith(github.ref_name, 'v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2

      - name: Login to Docker Hub
        uses: docker/login-action@327cd5a69de6c009b9ce71bce8395f28e651bf99
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca

      - name: Build and push to Docker Hub - UNSTABLE
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.APP_DEV_VERSION }}
          platforms: linux/amd64

  production:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs: test
    if: (github.ref_name == 'master' || startsWith(github.ref_name, 'v')) && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@327cd5a69de6c009b9ce71bce8395f28e651bf99
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca

      - name: Build and push - PROD
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.ref_name }}
          platforms: linux/amd64

      - name: Update Kubernetes manifest
        if: startsWith(github.ref_name, 'v')
        run: |
          sed -i "s|dyallo/infobae_api:.*|dyallo/infobae_api:${{ github.ref_name }}|" \
            infra/kubernetes/prod/002-infobae-deployment.yaml

      - name: Commit and push manifest update
        if: startsWith(github.ref_name, 'v')
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add infra/kubernetes/prod/002-infobae-deployment.yaml
          git commit -m "chore: update image tag to ${{ github.ref_name }}"
          git push origin HEAD:refs/heads/master
