apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infobae-api

resources:
  - ../../base

commonLabels:
  environment: prod

replicas:
  - name: infobae-api
    count: 2

images:
  - name: dyallo/infobae_api
    newTag: v1.14.0

patches:
  - path: service-patch.yaml
    target:
      kind: Service